# ─────────────────────────────────────────────────────────────────────────────
# Site Information
# ─────────────────────────────────────────────────────────────────────────────
site_name: SoongSanTech
site_url: https://soongsantech.github.io/
site_author: SoongSanTech (SIT)
site_description: >-
  숭산텍(SIT)의 자율주행 연구 지식 위키 및 R&D 로깅 플랫폼.
  디지털 트윈과 AI를 통한 Sim-to-Real 자율주행 모델을 연구하고 개발합니다.

# ─────────────────────────────────────────────────────────────────────────────
# Repository Information
# ─────────────────────────────────────────────────────────────────────────────
repo_name: SoongSanTech/SoongSanTech.github.io
repo_url: https://github.com/SoongSanTech/SoongSanTech.github.io
edit_uri: edit/main/docs/

# 빌드에서 제외할 파일
exclude_docs: |
  /includes/

copyright: >
  Copyright &copy; 2024 - 2026 SoongSanTech (SIT) ·
  <a href="https://creativecommons.org/licenses/by/4.0/deed.ko">CC BY 4.0</a>

# ─────────────────────────────────────────────────────────────────────────────
# Theme Configuration
# ─────────────────────────────────────────────────────────────────────────────
theme:
  name: material
  language: ko
  logo: assets/img/logo/SIT_Logo_128.png
  favicon: assets/img/favicons/favicon.ico
  custom_dir: overrides

  # Deep Dive 테마: Inter + Pretendard 조합 (한글 가독성)
  font:
    text: Inter
    code: JetBrains Mono

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    annotation: material/arrow-right-circle

  # Hybrid Palette: Deep Indigo (#4B0082) + Sky Blue (#00BFFF) / 42dot-style dark default
  # 실제 색상은 docs/assets/stylesheets/extra.css 의 CSS 변수로 오버라이드
  palette:
    # Dark mode (default — 42dot 스타일)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로 전환
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 다크 모드로 전환

  features:
    # Navigation
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    # TOC
    - toc.follow
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Header
    - header.autohide
    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - content.action.edit
    - content.action.view
    # Announcement
    - announce.dismiss

# ─────────────────────────────────────────────────────────────────────────────
# Plugins
# ─────────────────────────────────────────────────────────────────────────────
plugins:
  - search:
      lang:
        - ko
        - en
  - tags
  # 지식저장소 (Knowledge): 이론/기술/아키텍처 관련 지식을 블로그 포스트 형태로 기록
  - blog:
      blog_dir: knowledge
      blog_toc: true
      post_date_format: medium
      post_url_date_format: yyyy/MM/dd
      post_url_format: "{categories}/{slug}"
      post_url_max_categories: 1
      post_excerpt: required
      post_excerpt_max_authors: 2
      archive: true
      archive_name: 아카이브
      archive_date_format: yyyy년 MM월
      categories: true
      categories_name: 카테고리
      categories_url_format: "category/{slug}"
      categories_allowed:
        - 이론 (Theory)
        - 기술 스택 (Tech Stack)
        - 시스템 아키텍처 (Architecture)
        - 시작하기 (Getting Started)
      pagination_per_page: 9
      authors_file: "{blog}/.authors.yml"
  # R&D 로그: 실험·진행 경과·트러블슈팅·마일스톤 기록
  - blog:
      blog_dir: rnd
      blog_toc: true
      post_date_format: medium
      post_url_date_format: yyyy/MM/dd
      post_url_format: "{date}/{slug}"
      post_excerpt: required
      post_excerpt_max_authors: 2
      archive: true
      archive_name: 아카이브
      archive_date_format: yyyy년 MM월
      categories: true
      categories_name: 카테고리
      categories_allowed:
        - Experiment
        - Engineering
        - Milestone
        - Research
      pagination_per_page: 9
      authors_file: "{blog}/.authors.yml"
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      timezone: Asia/Seoul
      locale: ko
      fallback_to_build_date: true
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

# ─────────────────────────────────────────────────────────────────────────────
# Markdown Extensions
# ─────────────────────────────────────────────────────────────────────────────
markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4
  - tables

  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# ─────────────────────────────────────────────────────────────────────────────
# Extra Configuration (Mermaid, Math, Social)
# ─────────────────────────────────────────────────────────────────────────────
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SoongSanTech
      name: SoongSanTech GitHub
    - icon: fontawesome/brands/instagram
      link: https://instagram.com/meng._.ro
      name: Instagram
    - icon: fontawesome/solid/envelope
      link: mailto:leeroy7321@gmail.com
      name: 이메일 문의

  generator: false

  status:
    new: 최근 추가
    deprecated: 더 이상 권장되지 않음

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - assets/stylesheets/extra.css

# ─────────────────────────────────────────────────────────────────────────────
# Navigation Structure
# ─────────────────────────────────────────────────────────────────────────────
nav:
  - 홈: index.md
  - 소개:
    - about/index.md
    - 팀 & 자원: about/team-and-resources.md
    - 프로젝트 개요: about/project-overview.md
  - 지식저장소:
    - knowledge/index.md
  - R&D 로그:
    - rnd/index.md
  - Contact:
    - contact/index.md
    - 기여하기: contact/contributing.md
    - 워크플로우(Git/PR): contact/workflow.md
    - 작성 템플릿: contact/templates.md
