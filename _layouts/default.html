<!doctype html>
<html lang="{{ site.lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">

  <link rel="icon" href="{{ site.brand.favicon | relative_url }}">
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/img/favicons/apple-icon-180x180.png' | relative_url }}">
  <link rel="manifest" href="{{ '/assets/img/favicons/manifest.json' | relative_url }}" crossorigin="use-credentials">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  {% feed_meta %}
  {% seo %}

  <script>
    // Prevent flash of wrong theme: read stored preference synchronously
    (function(){
      try {
        var t = localStorage.getItem('sit-theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-theme', t);
        }
      } catch(e){}
    })();
  </script>
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script defer src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
